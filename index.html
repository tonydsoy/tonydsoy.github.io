<!DOCTYPE html>
<html lang="en">
<head>
    <!-- home and games icons by Miguel C Balandrano -->
    <!-- many more icons from https://stuff.splitbrain.org/ico/ -->

    <!-- thank you to KnoblePersona for the ocean background! https://opengameart.org/content/ocean-background -->
    <meta charset="UTF-8">
    <meta name="description" content="Hi! welcome to my website. im tony, a small developer from canada.">
    <meta name="keywords" content="coding, personal, neocities, geocities">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="mobile.css">
    <link rel="stylesheet" href="contentstyles.css">
    <link rel="stylesheet" href="popup.css">

    <link rel="icon" type="image/x-icon" href="favicon.png">
    <script src="verycoolfunctions.js"></script>
    <script src="contents.js"></script>
    <script src="separators.js"></script>
    <script src="modifiers.js"></script>
    <script src="musicplayer.js"></script>
    <script src="devsense.js"></script>
    <script src="barrelroll.js"></script>
    <title>tony's site</title>
    <br>
</head>
<body> 
    <span id="devwarn-spawn" style="display:none;">yes</span>
    <div class="body-background">
        <div id="bb-invert"></div>
    </div>
    <div id="modifiers">
        <div class="modifiers-right">
            <div class="height-max bordering">
                <div class="mod-content">
                    <img onclick="invertcolors.invert()" class="hoverscale bgblur clickable" height="32px" src="graphics/refresh.png">
                    <img onclick="barrelroll.roll()" class="hoverscale bgblur clickable" height="32px" src="graphics/barrel.png">
                </div>
            </div>
        </div>
    </div>
    <div class="middled">
        <div class="top-signature">
            <img class="hoverscale pixelart" src="graphics/graffiti.png"> 
        </div>
        <div class="bordering radius10">
            <div class="content radius5">
                <div class="split-sidebar">
                    <div>
                        <div onclick="changecontent('homepage')" class="center-text margins-10 white-hover clickable"><img src="graphics/home.png" height="15px" style="transform:translateY(3px)">Home</div>
                        <div onclick="changecontent('settings')" class="center-text margins-10 white-hover clickable">site settings</div>
                        <div class="sidebar-separator clickable">Menu!</div>
                        <div class="sidebar-section">
                            <div onclick="changecontent('music')"><img class="pixelart-inline" src="graphics/music.png"> My Music</div>
                            <div onclick="changecontent('resources')"><img class="pixelart-inline" src="graphics/folder.png"> My Resources</div>
                            <div onclick="changecontent('tools')"><img class="pixelart-inline" src="graphics/wrench-screwdriver.png"> My Tools</div>
                            <div onclick="changecontent('guides')"><img class="pixelart-inline" src="graphics/doc-info.png"> My Guides</div>
                            <div onclick="changecontent('blog')"><img class="pixelart-inline" src="graphics/blog.png"> My blog</div>
                        </div>
                        <div class="sidebar-separator clickable">mystery items</div>
                        <div class="sidebar-section">
                            <div onclick="changecontent('theworld')">minecraft world</div>
                            <div onclick="changecontent('aboutme')">bout' me</div>
                            <div onclick="changecontent('contact')">contact me!</div>
                            <div onclick="changecontent('games')">games</div>
                        </div>
                        <div class="sidebar-text bordering padding-5">
                            this site is open-source! heres the <a href="https://github.com/tonydsoy/tonydsoy.github.io">repo!</a>.
                        </div>
                        <div class="sidebar-text bordering padding-5">
                            <audio id="music-player" src="sounds/music/1. hesitation [fj7MHkCgGxk].webm.mp3"></audio>
                            <div id="music-playing" class="center-text">
                                <span id="music-text">1. hesitation [fj7MHkCgGxk].webm.mp3</span>
                            </div>
                            <div class="clickable" id="music-controls">
                                <span id="prev-song">⏮</span>
                                <span id="pauseplay">▶</span>
                                <span id="next-song">⏭</span>
                            </div>
                        </div>
                        <img width="160px" src="graphics/テトリス-重音テト.webp"> 
                    </div>
                    <div id="main-content"></div>
                </div>
            </div>
        </div>
    </div>
</html>
