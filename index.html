<!DOCTYPE html>
<html lang="en">
<head>
    <!-- home and games icons by Miguel C Balandrano -->
    <!-- many more icons from https://stuff.splitbrain.org/ico/ -->

    <!-- thank you to KnoblePersona for the ocean background! https://opengameart.org/content/ocean-background -->
    <meta charset="UTF-8">
    <meta name="description" content="Hi! welcome to my website. im tony, a small developer from canada.">
    <meta name="keywords" content="coding, personal, neocities, geocities">
    <link rel="stylesheet" href="fonts.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="contentstyles.css">
    <link rel="stylesheet" href="popup.css">

    <link rel="icon" type="image/x-icon" href="favicon.png">

    <script src="sidebarmobile.js"></script>
    <script src="keyboardcontrols.js"></script>
    <script src="verycoolfunctions.js"></script>
    <script src="contents.js"></script>
    <script src="separators.js"></script>
    <script src="modifiers.js"></script>
    <script src="musicplayer.js"></script>
    <script src="devsense.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded",() => {
            contents.afterloadcontents(document);
        })
    </script>
    <title>tony's site</title>
    <br>
</head>
<body>
    <div class="hidden">
        <img src="graphics/cancel.png">
    </div>
    <div class="internal-events">
        <div id="close-all-separators"></div>
    </div>
    <div class="body-background">
        <div id="bb-invert"></div>
    </div>
    <div id="modifiers">
        <div class="modifiers-left">
            <div class="height-max bordering">
                <div class="mod-content">
                    <img onclick="mobilesidebar.opensidebar()" height="32px" class="hoverscale bgblur clickable tab-click pixelart" src="graphics/hamburger.png">
                </div>
            </div>
        </div>
        <div class="modifiers-right">
            <div class="height-max bordering">
                <div class="mod-content">
                    <img alt="magically turn into an enderman" onclick="invertcolors.invert()" class="hoverscale bgblur clickable tab-click" height="32px" src="graphics/refresh.png">
                    <img alt="do a barrel roll." onclick="barrelroll.roll()" class="hoverscale bgblur clickable tab-click" height="32px" src="graphics/barrel.png">
                    <img alt="weezer" onclick="weezer.riff()" class="hoverscale bgblur clickable tab-click" height="32px" src="graphics/weezer.jpg">
                </div>
            </div>
        </div>
    </div>
    <div class="middled">
        <div class="top-signature">
            <img class="pixelart" src="graphics/graffiti.png"> 
        </div>
        <div class="bordering radius10">
            <div class="content radius5">
                <div class="split-sidebar">
                    <div class="sidebar">
                        <div>
                            <div onclick="changecontent('homepage')" class="center-text margins-10 white-hover clickable tab-click"><img src="graphics/home.png" height="15px" style="transform:translateY(3px)">Home</div>
                            <div class="sidebar-separator clickable tab-click">My Stuff</div>
                            <div class="sidebar-section">
                                <div onclick="changecontent('music')"><img class="pixelart-inline" src="graphics/music.png"> My Music</div>
                                <div onclick="changecontent('tools')"><img class="pixelart-inline" src="graphics/wrench-screwdriver.png"> My Tools</div>
                                <div onclick="changecontent('fanworks')"><img height="16px" class="pixelart-inline" src="graphics/ao3-high.png"> My Fanworks</div>
                                <div onclick="changecontent('guides')"><img class="pixelart-inline" src="graphics/doc-info.png"> My Guides</div>
                                <div onclick="changecontent('blog')"><img class="pixelart-inline" src="graphics/blog.png"> My blog</div>
                            </div>
                            <div class="sidebar-separator clickable tab-click">about me</div>
                            <div class="sidebar-section">
                                <div onclick="changecontent('aboutme')">bout' me</div>
                                <div onclick="changecontent('theworld')">minecraft world</div>
                                <div onclick="changecontent('contact')">contact me!</div>
                            </div>
                            <div class="sidebar-separator clickable tab-click">this website</div>
                            <div class="sidebar-section">
                                <div onclick="changecontent('games')">games</div>
                                <div no-tab=""><a class="hidden-a width-full" href="https://github.com/tonydsoy/tonydsoy.github.io/commits/main/" target="_blank">changelog</a></div>
                            </div>
                            <div class="sidebar-text bordering padding-5">
                                this site is open-source! heres the <a target="_blank" href="https://github.com/tonydsoy/tonydsoy.github.io">repo!</a>.
                            </div>
                            <div class="sidebar-text bordering padding-5">
                                <audio id="music-player" src="sounds/music/1. hesitation [fj7MHkCgGxk].webm.mp3"></audio>
                                <div id="music-player-topbar">
                                    <span>music player</span>
                                    <span class="popup-action clickable float-right" popup-type="data" popup-data="<iframe src='popups/mp-settings.html' height='600' width='800'>">⚙</span>
                                </div>
                                <div id="music-playing" class="center-text">
                                    <span id="music-text">1. hesitation [fj7MHkCgGxk].webm.mp3</span>
                                </div>
                                <div class="clickable" id="music-controls">
                                    <span id="prev-song">⏮</span>
                                    <span id="pauseplay">▶</span>
                                    <span id="next-song">⏭</span>
                                </div>
                            </div>
                            <img width="160px" src="graphics/テトリス-重音テト.webp">
                        </div>
                    </div>
                    <div id="main-content"></div>
                </div>
            </div>
        </div>
    </div>
</html>
