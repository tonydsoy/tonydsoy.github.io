<!DOCTYPE html>
<html lang="en">
<head>
    <!-- home and games icons by Miguel C Balandrano -->
    <!-- many more icons from https://stuff.splitbrain.org/ico/ -->
    <meta charset="UTF-8">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <script src="contents.js"></script>
    <script src="separators.js"></script>
    <title>tony's site</title>
    <br>
</head>
<body>
    <input type="checkbox" name="invert-colors" id="invert-colors" hidden>
    <div class="middled">
        <div class="top-signature">
            <img class="hoverscale pixelart" src="graphics/graffiti.png"> 
        </div>
        <div class="bordering radius10">
            <div class="content radius5">
                <div>
                    <div onclick="changecontent('homepage')" class="center-text margins-10 white-hover clickable"><img src="icons/home.png" height="15px" style="transform:translateY(3px)">Home</div>
                    <div class="sidebar-separator clickable" id="separator-0" sepid="0">Menu!</div>
                    <div class="sidebar-section" id="separator-0-sec">
                        <div onclick="changecontent('music')"><img class="pixelart-inline" src="icons/music.png"> My Music</div>
                        <div onclick="changecontent('resources')"><img class="pixelart-inline" src="icons/folder.png"> My Resources</div>
                        <div onclick="changecontent('tools')"><img class="pixelart-inline" src="icons/wrench-screwdriver.png"> My Tools</div>
                        <div onclick="changecontent('guides')"><img class="pixelart-inline" src="icons/doc-info.png"> My Guides</div>
                        <div onclick="changecontent('blog')"><img class="pixelart-inline" src="icons/blog.png"> My blog</div>
                        <div onclick="changecontent('theworld')">minecraft world</div>
                    </div>
                    <div class="sidebar-separator clickable" id="separator-1" sepid="1">
                        <img src="icons/games.png" height="15px" style="transform:translateY(3px)">
                        Games
                    </div>
                    <div class="sidebar-section" id="separator-1-sec">
                        <div onclick="changepage('/games/eaglercraft')">Minecraft</div>
                        <div onclick="changepage('/games/tetris')">Tetris</div>
                        <div onclick="changepage('/games/slope')">Slope</div>
                        <div onclick="changepage('/games/xash3d')">Half-life</div>
                        <div onclick="changepage('/games/fnaf1')">FNAF 1</div>
                        <div onclick="changepage('/fnaf2-tonyweb')">FNAF 2</div>
                        <div onclick="changepage('/games/cc')">Cookie Clicker</div>
                        <div onclick="changepage('/webprboom')">Doom</div>
                    </div>
                    <div class="sidebar-text bordering padding-5">
                        console modding section coming soon!
                    </div>
                    <div class="sidebar-section" id="separator-1-sec">
                        <label for="invert-colors"><div>invert colors</div></label>
                    </div>
                </div>
                <div id="main-content"></div>
            </div>
        </div>
    </div>
</html>
